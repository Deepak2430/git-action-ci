name: Real Project CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Code Download Karo
        uses: actions/checkout@v4

      - name: Node.js Environment Setup
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Dependencies Install Karo
        run: npm install

      - name: Automated Tests Chalao
        run: npm test